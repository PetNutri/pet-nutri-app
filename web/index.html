<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pet_nutri_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PetNutri</title>
  <link rel="manifest" href="manifest.json">
  <style>
    #lang-toggle {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 9999;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 8px 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      cursor: pointer;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s;
    }
    #lang-toggle:hover { transform: scale(1.05); }
    #lang-toggle:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <button id="lang-toggle" onclick="translatePage()">🌐 English</button>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function translatePage() {
      var currentUrl = window.location.href;
      window.open('https://translate.google.com/translate?sl=sr&tl=en&u=' + encodeURIComponent(currentUrl), '_blank');
    }
  </script>
</body>
</html>
