<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="pet_nutri_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>PetNutri</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* Google Translate dugme - pozicionirano gore desno */
    #google_translate_element {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 4px 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }
    /* Sakrij Google branding */
    .goog-te-gadget-simple {
      background: transparent !important;
      border: none !important;
      font-size: 13px !important;
    }
    .goog-te-gadget-simple .goog-te-menu-value span {
      color: #333 !important;
    }
    /* Sakrij Google Translate banner na vrhu */
    .skiptranslate {
      display: none !important;
    }
    body { top: 0 !important; }
  </style>
</head>
<body>
  <div id="google_translate_element"></div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'sr',
        includedLanguages: 'sr,en',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay: false
      }, 'google_translate_element');
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
